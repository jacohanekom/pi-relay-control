# pi-relay-control configuration
# Changes take effect after: sudo systemctl restart pi-relay-control.service

# GPIO pin (BCM numbering)
# IO21 on DFRobot GPIO Screw HAT = BCM 5
gpio_pin 5

# Socket port for nc control
# Usage: echo "on"     | nc localhost 7778
#        echo "off"    | nc localhost 7778
#        echo "status" | nc localhost 7778
port 7778
